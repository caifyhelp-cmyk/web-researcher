services:
  - type: web
    name: web-researcher
    runtime: python
    repo: https://github.com/caifyhelp-cmyk/web-researcher
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.fileWatcherType=none
    plan: free
    region: singapore
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
